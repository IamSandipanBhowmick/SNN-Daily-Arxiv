# This is a basic workflow to help you get started with Actions


name: Run Arxiv Papers Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

permissions:
  contents: write

env:
  GITHUB_USER_NAME: github-actions[bot]
  GITHUB_USER_EMAIL: github-actions[bot]@users.noreply.github.com

jobs:
  build:
    name: update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python Env
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install arxiv
          pip install requests

      - name: Run daily arxiv
        run: |
          python daily_arxiv.py

      - name: Commit and push updated files
        run: |
          git config --global user.name "${{ env.GITHUB_USER_NAME }}"
          git config --global user.email "${{ env.GITHUB_USER_EMAIL }}"

          git add README.md snn-arxiv-daily.json

          git commit -m "Github Action Automatic Update SNN Arxiv Papers" || echo "No changes to commit"

          git push


